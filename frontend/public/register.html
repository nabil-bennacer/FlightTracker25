<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription - FlightTracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<!-- 1) Classe page-register pour cibler le fond -->
<body class="page-register">
  <!-- 2) Header avec menu dropdown -->
  <header>
    <h1 class="logo"> ✈ FlightTracker25</h1>
  </header>

  <main class="auth-container login-container">
    <h2>Créer un compte</h2>
    <form id="registerForm">
      <input type="text"    id="username" placeholder="Nom d’utilisateur" required>
      <input type="email"   id="email"    placeholder="Email"           required>
      <input type="password" id="password" placeholder="Mot de passe"   required>
      <button type="submit" class="primary-button">
        <!--  Icone avion à gauche du texte  -->
        <img src="img/plane-icon.png" alt="" class="btn-icon" />
        S’inscrire
      </button>
    </form>

    <p class="signup-prompt">
      Déjà un compte ?
      <a href="login.html">Connectez-vous</a>
    </p>

    <a onclick="window.location.href='index.html'" class="secondary-button">
      ← Retour à l’accueil
    </a>
  </main>

  <script src="js/register.js" type="module"></script>
</body>
</html>
