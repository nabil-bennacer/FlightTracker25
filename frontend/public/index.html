<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FlightTracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css">
</head>
<body>
  <header>
    <h1>FlightTracker25</h1>
    <div id="searchContainer">
      <input
        type="text"
        id="flightSearch"
        placeholder="🔍 Rechercher un vol (ex : AFR123)"
        autocomplete="off"
      />
      <ul id="searchSuggestions" class="suggestions"></ul>
    </div>
    <div id="userMenu" class="dropdown">
      <button class="dropbtn">☰</button>
      <div class="dropdown-content" id="authOptions">
        <a href="login.html" id="loginLink">Se connecter</a>
        <a href="register.html" id="registerLink">S'inscrire</a>
        <a href="admin.html" id="adminLink" style="display:none;">Administration</a>
      </div>
    </div>
  </header>

  <div id="favoritesSection" style="display:none; position:absolute; top:130px; left:20px; z-index:20;">
    <h3>⭐ Mes favoris</h3>
    <ul id="favoritesList"></ul>
  </div>

  <div id="map"></div>
  
  <div id="popup" class="ol-popup">
    <a href="#" id="popup-closer">✖</a>
    <div id="popup-content"></div>
  </div>

  <div id="plane-popup" class="ol-popup">
    <a href="#" id="plane-popup-closer">✖</a>
    <div id="plane-popup-content"></div>
  </div>

  <!-- Panneau latéral de détails -->
  <aside id="sidePanel" class="side-panel">
    <button id="sidePanelClose" class="popup-close">✖</button>
    <div class="popup-image"></div>
    <div class="popup-header"></div>
    <div id="sidePanelContent" class="popup-body"></div>
    <div class="popup-footer"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/search.js"></script>
</body>
</html>
