<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion – FlightTracker25</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <header class="navbar">
    <div class="navbar-brand">
      <span class="brand-name"> ✈ FlightTracker25</span>
    </div>
  </header>

  <main class="auth-container login-container">
    <h2>Connexion</h2>
    <form id="loginForm">
      <input id="username" name="username" type="text"    placeholder="Nom d’utilisateur" required>
      <input id="password" name="password" type="password" placeholder="Mot de passe"   required>
      <button type="submit" class="primary-button">Se connecter</button>
    </form>
    <p class="signup-prompt">
      Pas encore de compte ? <a href="register.html">Inscrivez-vous</a>
    </p>
    <a class="secondary-button" onclick="window.location.href='index.html'">
      ← Retour à l’accueil
    </a>
  </main>

  <script src="js/login.js" type="module"></script>
</body>
</html>
