<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <h2>Connexion</h2>
    <form id="loginForm">
      <input id="username" type="text" name="username" placeholder="Nom d'utilisateur" required><br>
      <input id="password" type="password" name="password" placeholder="Mot de passe" required><br>
      <button type="submit" class="primary-button">Se connecter</button>
    </form>
    <button class="secondary-button" onclick="window.location.href='index.html'">
      ← Revenir à l’accueil
    </button>
  </div>


  <script src="login.js"></script>
</body>
</html>
