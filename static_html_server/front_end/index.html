<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FlightTracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css">
</head>
<body>
  <header>
    <h1>FlightTracker</h1>
    <div id="userMenu" class="dropdown">
      <button class="dropbtn">☰</button>
      <div class="dropdown-content" id="authOptions">
        <a href="login.html">Se connecter</a>
        <a href="register.html">S'inscrire</a>
        <a href="admin.html" id="adminLink" style="display:none;">Administration</a>
      </div>
    </div>
  </header>

  <div id="searchBar" style="display:none; padding: 10px; position: absolute; top: 80px; left: 20px; z-index: 20;">
    <input type="text" id="flightSearch" placeholder="🔍 Rechercher un vol (ex: AFR123)" style="padding: 6px; width: 250px; border-radius: 4px; border: 1px solid #ccc;" />
  </div>

  <div id="favoritesSection" style="display:none; position: absolute; top: 130px; left: 20px; z-index: 20; background: white; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
    <h3>⭐ Mes favoris</h3>
    <ul id="favoritesList" style="margin: 0; padding-left: 20px;"></ul>
  </div>

  <div id="map"></div>

  <div id="popup" class="ol-popup">
    <a href="#" id="popup-closer" class="ol-popup-closer"></a>
    <div id="popup-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
  <script src="main.js"></script>
</body>
</html>
